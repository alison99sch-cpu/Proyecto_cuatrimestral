<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS uñas</title>
    <link rel="shortcut icon" href="Imagenes/icono/preguntas.svg" type="image/svg" >

</head>
<body>
    <h1>SOS uñas!</h1>
    <form action="">
        <fieldset>
        <legend>Datos personales:</legend>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        </fieldset>
        <br><br>

       <fieldset>
        <legend>¿En qué puedo ayudarte?:</legend>
        <input type="radio" id="duda" name="consulta" value="duda">
        <label for="duda">Tengo una duda/pregunta</label><br>
        <input type="radio" id="idea" name="consulta" value="idea">
        <label for="idea">Quiero compartir una idea/sugerencia</label><br>
        <input type="radio" id="otro" name="consulta" value="otro">
        <label for="otro">Otro</label><br>
        </fieldset>
        <br><br>

        <fieldset>
            <legend>Puedes escribir tu consulta o sugerencia aquí:</legend>
            <textarea name="mensaje" rows="4" cols="50" placeholder="¡Contame lo que tenés en mente!"></textarea>

        </fieldset>
        <br><br>

        <button type="submit">Enviar</button>

        
         
   
    </form>
    
</body>
</html>
